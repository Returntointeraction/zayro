<!DOCTYPE html>
<html lang="eng">
    <head>
        <title>Zayro</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inatial-scale=1.0">
        <link rel="icon" type="image/png" href="متجر1.png">
        <link rel="stylesheet" href="style.css">
        <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">


    </head>

    <body>
        
        <div class="img">              
            <img src="zayro-removebg-preview.png"  style="width: 300px ; height: 180px">
        </div>
        
        <div class="page-signup">
            <form action="">
                <h1>sign up</h1>
                
               
                
                <div class="input-signup">
                    <input type="text" placeholder="User-Name" required>
                    <i class="bxrf bx-user"></i>
                </div>
                
                <div class="input-signup">
                    <input type="email" placeholder="email" required>
                    <i class="bxrf bx-user"></i>
                </div>
                
                <div class="input-signup">
                    <input type="password" placeholder="Password " required>
                    <i class="bxrf bx-lock"></i>
                </div>

                
                
                <div class="remember-signup">
                    <label><input type="checkbox">Remember Me</label>
                    <a href="#">forget password?</a>
                </div>
            
                <button type="submit" class="btn">Signup</button>
                
                
                <div class="Login">
                    <p>Do you have an account? <a href="../login/">login</a> </p>
                    

            </form>



        </div>




    </body>


</html>
